<svg xmlns="http://www.w3.org/2000/svg" width="520" height="400" viewBox="0 0 520 400" fill="none">
  <defs>
    <linearGradient id="g1" x1="80" y1="40" x2="420" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5eead4" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#818cf8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="g2" x1="260" y1="120" x2="260" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>
  <rect width="520" height="400" rx="32" fill="url(#g1)"/>
  <circle cx="120" cy="90" r="70" fill="#5eead4" fill-opacity="0.12" filter="url(#blur)"/>
  <circle cx="400" cy="110" r="90" fill="#818cf8" fill-opacity="0.1" filter="url(#blur)"/>
  <!-- simplified "home + split" motif -->
  <path d="M260 118 L330 168 V260 H190 V168 L260 118Z" stroke="rgba(255,255,255,0.35)" stroke-width="3" fill="rgba(15,23,42,0.35)"/>
  <path d="M260 128 L318 172 V252 H202 V172 L260 128Z" fill="url(#g2)" fill-opacity="0.45"/>
  <rect x="236" y="210" width="48" height="52" rx="4" fill="rgba(15,23,42,0.55)"/>
  <!-- people dots -->
  <circle cx="200" cy="300" r="18" fill="#5eead4" fill-opacity="0.85"/>
  <circle cx="260" cy="312" r="20" fill="#a5b4fc" fill-opacity="0.9"/>
  <circle cx="320" cy="300" r="18" fill="#5eead4" fill-opacity="0.85"/>
  <!-- arrows suggesting split -->
  <path d="M200 280 L240 255" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M320 280 L280 255" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M260 255 V228" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- floating "bill" card -->
  <rect x="150" y="52" width="220" height="56" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <rect x="168" y="68" width="72" height="8" rx="4" fill="rgba(255,255,255,0.35)"/>
  <rect x="168" y="84" width="120" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
  <text x="330" y="88" fill="rgba(94,234,212,0.95)" font-family="system-ui,sans-serif" font-size="18" font-weight="700">÷</text>
</svg>
